<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Manna — a daily biblical Connections puzzle</title>
  <meta name="description" content="Group four hidden biblical connections. A new puzzle every day.">
  <meta property="og:title" content="Manna">
  <meta property="og:description" content="A daily biblical Connections puzzle. Group four hidden connections every day.">
  <meta property="og:type" content="website">
  <style>
    :root { --parchment:#FAF5E8; --ink:#2E261A; --gold:#E7C54A; --muted:#6B6048; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--parchment); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100%; padding: 2rem; text-align: center;
    }
    .card { max-width: 30rem; }
    .wordmark {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 16vw, 5rem); font-weight: 700;
      letter-spacing: 0.01em; margin: 0;
    }
    .tag { font-size: 1.1rem; color: var(--muted); margin: 0.5rem 0 2rem; }
    .cta {
      display: inline-block; background: var(--ink); color: var(--parchment);
      text-decoration: none; font-weight: 600; font-size: 1.05rem;
      padding: 0.85rem 1.6rem; border-radius: 999px;
    }
    .cta:active { opacity: 0.85; }
    .dots { margin: 2.5rem auto 0; display: flex; gap: 0.5rem; justify-content: center; }
    .dot { width: 0.85rem; height: 0.85rem; border-radius: 3px; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="wordmark">Manna</h1>
    <p class="tag">A daily biblical Connections puzzle.</p>
    <a class="cta" href="https://apps.apple.com/app/manna/id6782489046">Get Manna on the App Store</a>
    <div class="dots" aria-hidden="true">
      <span class="dot" style="background:#E7C54A"></span>
      <span class="dot" style="background:#99D19E"></span>
      <span class="dot" style="background:#8CBAEB"></span>
      <span class="dot" style="background:#C7A6E6"></span>
    </div>
  </main>
</body>
</html>
